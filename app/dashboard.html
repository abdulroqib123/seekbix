<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SeekBix</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/toast.css">

</head>
<body>
    <aside class="sidebar">
<button type="btn" id="newEntry" class="btn new-entry">+ Add entry</button>

<div class="entry-list">

</div>
    </aside>
    <main class="main-content">
<div class="main-content-header">
    <div class="main-content-header-inner">
        <input type="text" class="entry-title inputField" id="entryTitle" placeholder="Title your entry" required>
        <select name="entryType" class="entry-type" id="entryType">
            <option value="note">Note</option>
            <option value="doc">Doc</option>
            <option value="faq">FAQ</option>
        </select>
    </div>

        <button type="button" class="saveBtn btn-secondary btn-pill btn" id="saveEntryBtn">Save</button>
</div>

    <div class="content-container">
        <textarea name="contentInput" id="contentInput" class="inputField content-input" placeholder="Start typing..." required></textarea>
    </div>
    </main>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
