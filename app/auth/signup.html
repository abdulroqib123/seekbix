<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | SeekBix</title>

    <!--CSS LINKS-->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components/forms.css" />
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />

    <style>
      main {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .authContainer {
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        padding: var(--space-md);
        text-align: center;
      }

      p {
        margin-bottom: 2rem;
      }
      .formActions {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }
      
      .form {
        align-items: flex-start;
        border-radius: var(--space-md);
      }
      .display {
        gap: 10px;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="modalContainer"></div>
    <!--TOAST MESSAGES-->
    <div id="toast"></div>
    <!--INFO DISPLAY-->
    <div id="infoDisplay"></div>

    <main class="main">
      <h1>
        <span class="logo">Seek<span>Bix</span></span>
      </h1>
      <p class="text-muted">
        Signup to create your business knowledge base
      </p>

      <div class="authContainer">
        <!--SIGNUP FORM-->
        <form class="form" id="signupForm">
          <h2 class="text-center" style="align-self: center">Signup</h2>
          <label for="signupNameInput">Name</label>
          <input
            type="text"
            name="signupNameInput"
            id="signupNameInput"
            class="inputField"
            placeholder="e.g. Abdulroqib Oladipo"
            required
          />
          <label for="userSignupEmailInput">Email</label>
          <input
            type="email"
            name="userSignupEmailInput"
            id="userSignupEmailInput"
            class="inputField"
            placeholder="e.g. example@gmail.com"
            required
          />
          <label for="userSignupPasswordInput">Password</label>
          <input
            type="password"
            name="userSignupPasswordInput"
            id="userSignupPasswordInput"
            class="inputField"
            placeholder="Create a password for your account"
            required
          />
          <label for="userSignupConfirmPasswordInput">Confirm Password</label>
          <input
            type="password"
            name="userSignupConfirmPasswordInput"
            id="userSignupConfirmPasswordInput"
            class="inputField"
            placeholder="Confirm your password"
            required
          />
          <button class="btn btn-pill" id="signupBtn" type="submit">Signup</button>

          <div class="formActions">
            <a href="login.html">Login Instead</a>
          </div>
        </form>

      </div>
    </main>

    <script type="module" src="../js/auth/signup.js"></script>
  </body>
</html>
